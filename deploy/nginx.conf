# ============================================================
# Nginx 主配置文件 - Vue 3 前端项目部署专用
# 用法：sudo nginx -c deploy/nginx.conf -p .
# 作用：静态资源服务 + SPA 单页应用 + API 反向代理到 Gateway
# ============================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    include       /usr/local/etc/nginx/mime.types;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip 压缩（减少传输体积，提升加载速度）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ============================================================
    # Server 配置 - 监听 80 端口
    # 请求流转：
    #   浏览器 -> Nginx (80) -> Gateway (10000) -> 业务服务 (8081/8082/8083)
    # ============================================================
    server {
        listen       80;
        server_name  localhost;

        # root: 前端静态资源根目录（Vue build 产物）
        root   /Users/wangjun/IdeaProjects/ai-microservices-frontend/dist;
        index  index.html;

        # ── 前端页面路由（Vue history 模式） ──
        # 匹配所有路径，优先找静态文件；找不到则回退到 index.html
        # 让 Vue Router 在前端处理路由
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 静态资源缓存（JS/CSS/图片等） ──
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public immutable";
            access_log off;
        }

        # ── API 反向代理 - 统一转发到 Gateway (10000) ──
        location /api/ {
            proxy_pass http://127.0.0.1:10000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # SSE 流式对话特殊处理（嵌套在 /api/ 之内）
            location /api/stream/ {
                proxy_pass http://127.0.0.1:10000;
                proxy_http_version 1.1;
                proxy_set_header Connection '';
                proxy_buffering off;
                proxy_cache off;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }
    }
}